<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <clipPath id="circleClip">
      <circle cx="1050" cy="150" r="88"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- soft wave accent -->
  <path d="M0,240 C260,300 700,200 1200,260 L1200,300 L0,300 Z" fill="#ffffff" opacity="0.06"/>
  <path d="M0,260 C320,300 760,230 1200,280 L1200,300 L0,300 Z" fill="#ffffff" opacity="0.08"/>

  <!-- text -->
  <text x="60" y="140" font-family="Fira Code, monospace" font-size="60" font-weight="700" fill="#ffffff">Rahad Islam</text>
  <text x="60" y="180" font-family="Fira Code, monospace" font-size="18" fill="#e9d5ff">CSE @ SUST · Full-Stack Developer · Competitive Programmer</text>

  <!-- circular photo, top-right, framed -->
  <circle cx="1050" cy="150" r="94" fill="#ffffff" opacity="0.95"/>
  <image href="https://raw.githubusercontent.com/Rahad0Islam/Rahad0Islam/main/rahad.png"
         x="962" y="62" width="176" height="176"
         clip-path="url(#circleClip)"
         preserveAspectRatio="xMidYMid slice"/>
  <circle cx="1050" cy="150" r="90" fill="none" stroke="#ffffff" stroke-width="4"/>
</svg>
